<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vinted Alerts">
<title>Vinted Alerts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111210;
    --surface: #1a1c19;
    --surface2: #222420;
    --border: #2a2d28;
    --orange: #e8631a;
    --green: #4caf74;
    --text: #e8e6e0;
    --text-dim: #7a7d76;
    --text-muted: #3d403a;
    --radius: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(17,18,16,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--orange), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    padding: 3px;
    border-radius: 8px;
  }

  .view-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 5px 9px;
    border-radius: 6px;
    font-size: 14px;
    transition: all 0.2s;
  }

  .view-btn.active {
    background: var(--surface);
    color: var(--orange);
  }

  /* MAIN */
  .main {
    padding-top: 56px;
    padding-bottom: calc(70px + var(--safe-bottom));
  }

  #page-feed { display: block; }
  #page-alertes { display: none; }

  /* GRID VIEW — 2 colonnes mobile, 4 colonnes desktop */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    padding: 2px;
  }

  @media (min-width: 768px) {
    .grid-view {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  .grid-card {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    background: var(--surface);
    cursor: pointer;
  }

  .grid-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
    display: block;
  }

  .grid-card:hover img { transform: scale(1.03); }

  .grid-card-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 28px 8px 8px;
  }

  .grid-card-alerte {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--orange);
    font-weight: 500;
    margin-bottom: 2px;
  }

  .grid-card-titre {
    font-size: 10px;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .grid-card-prix {
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
  }

  .grid-card-buy {
    position: absolute;
    top: 6px; right: 6px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, background 0.2s;
    z-index: 2;
  }

  .grid-card-buy:hover { transform: scale(1.1); }
  .grid-card-buy:active { transform: scale(0.9); }
  .grid-card-buy.loading { background: var(--text-dim); }
  .grid-card-buy.success { background: var(--green); }
  .grid-card-buy.error { background: #e84040; }

  /* SINGLE VIEW */
  .single-view {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 8px;
  }

  @media (min-width: 768px) {
    .single-view {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
      gap: 8px;
    }
  }

  .single-card {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .single-card-img {
    width: 100px;
    min-height: 130px;
    flex-shrink: 0;
    object-fit: cover;
    display: block;
  }

  @media (min-width: 768px) {
    .single-card-img { width: 140px; min-height: 170px; }
  }

  .single-card-body {
    flex: 1;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .single-card-alerte {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--orange);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .single-card-titre {
    font-size: 11px;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
    margin-bottom: 8px;
  }

  .single-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .single-card-prix {
    font-size: 15px;
    font-weight: 500;
    color: var(--green);
  }

  .single-card-date {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .single-card-buy {
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .single-card-buy:hover { opacity: 0.9; }
  .single-card-buy:active { transform: scale(0.95); }
  .single-card-buy.loading { background: var(--text-dim); }
  .single-card-buy.success { background: var(--green); }
  .single-card-buy.error { background: #e84040; }

  /* ALERTES PAGE */
  .alertes-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  @media (min-width: 768px) {
    .alertes-list { max-width: 600px; margin: 0 auto; padding: 20px; }
  }

  .alerte-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .alerte-card:hover { border-color: var(--orange); }

  .alerte-card-nom {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .alerte-card-count {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .alerte-card-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
  }

  .alerte-detail { display: none; padding: 0 12px 16px; }
  .alerte-detail.visible { display: block; }

  .alerte-detail-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }

  .back-btn {
    background: var(--surface2);
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 7px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
  }

  .alerte-detail-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--orange);
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(17,18,16,0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 8px 0 calc(8px + var(--safe-bottom));
    display: flex;
    justify-content: center;
    gap: 60px;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 8px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 16px;
    border-radius: 8px;
    transition: color 0.2s;
  }

  .nav-btn .icon { font-size: 18px; }
  .nav-btn.active { color: var(--orange); }

  /* EMPTY & LOADING */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 12px;
  }

  .loading-spinner {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 11px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 11px;
    z-index: 200;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: #e84040; color: #e84040; }

  .no-img {
    width: 100%; height: 100%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--text-muted);
  }

  /* LOAD MORE */
  .load-more-btn {
    display: block;
    width: calc(100% - 16px);
    margin: 12px 8px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s;
  }

  .load-more-btn:hover { border-color: var(--orange); color: var(--orange); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">VINTED ALERTS</div>
  <div class="view-toggle" id="viewToggle">
    <button class="view-btn active" onclick="setView('grid')" id="btnGrid">⊞</button>
    <button class="view-btn" onclick="setView('single')" id="btnSingle">☰</button>
  </div>
</div>

<div class="main">
  <div id="page-feed">
    <div id="feed-container" class="loading-spinner">Chargement...</div>
  </div>

  <div id="page-alertes">
    <div class="alertes-list" id="alertes-list">
      {% for alerte in alertes %}
      <div class="alerte-card" onclick="ouvrirAlerte('{{ alerte.nom }}')">
        <div>
          <div class="alerte-card-nom">{{ alerte.nom }}</div>
          <div class="alerte-card-count" id="count-{{ alerte.nom }}">Chargement...</div>
        </div>
        <div class="alerte-card-dot"></div>
      </div>
      {% endfor %}
    </div>
    <div class="alerte-detail" id="alerte-detail">
      <div class="alerte-detail-header">
        <button class="back-btn" onclick="fermerAlerte()">← Retour</button>
        <div class="alerte-detail-title" id="alerte-detail-title"></div>
      </div>
      <div id="alerte-detail-content"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('feed')" id="nav-feed">
    <span class="icon">⚡</span>Feed
  </button>
  <button class="nav-btn" onclick="showPage('alertes')" id="nav-alertes">
    <span class="icon">🔔</span>Alertes
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentView = 'grid';
  let currentPage = 'feed';
  let allArticles = [];
  let displayedCount = 0;
  const PAGE_SIZE = 40;

  function showPage(page) {
    currentPage = page;
    document.getElementById('page-feed').style.display = page === 'feed' ? 'block' : 'none';
    document.getElementById('page-alertes').style.display = page === 'alertes' ? 'block' : 'none';
    document.getElementById('nav-feed').classList.toggle('active', page === 'feed');
    document.getElementById('nav-alertes').classList.toggle('active', page === 'alertes');
    document.getElementById('viewToggle').style.display = page === 'feed' ? 'flex' : 'none';
    if (page === 'alertes') chargerCompteurs();
  }

  function setView(view) {
    currentView = view;
    document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
    document.getElementById('btnSingle').classList.toggle('active', view === 'single');
    displayedCount = 0;
    renderArticles(allArticles);
  }

  async function chargerFeed() {
    try {
      const res = await fetch('/api/articles');
      allArticles = await res.json();
      displayedCount = 0;
      renderArticles(allArticles);
    } catch(e) {
      document.getElementById('feed-container').innerHTML = '<div class="empty">Erreur de chargement</div>';
    }
  }

  async function chargerCompteurs() {
    const alertes = {{ alertes | tojson }};
    for (const alerte of alertes) {
      try {
        const res = await fetch(`/api/articles?alerte=${encodeURIComponent(alerte.nom)}`);
        const data = await res.json();
        const el = document.getElementById(`count-${alerte.nom}`);
        if (el) el.textContent = `${data.length} article${data.length > 1 ? 's' : ''} trouvé${data.length > 1 ? 's' : ''}`;
      } catch(e) {}
    }
  }

  async function ouvrirAlerte(nom) {
    document.getElementById('alertes-list').style.display = 'none';
    const detail = document.getElementById('alerte-detail');
    detail.classList.add('visible');
    document.getElementById('alerte-detail-title').textContent = nom;
    document.getElementById('alerte-detail-content').innerHTML = '<div class="loading-spinner">Chargement...</div>';
    try {
      const res = await fetch(`/api/articles?alerte=${encodeURIComponent(nom)}`);
      const articles = await res.json();
      document.getElementById('alerte-detail-content').innerHTML = `<div class="single-view">${renderSingleList(articles)}</div>`;
    } catch(e) {
      document.getElementById('alerte-detail-content').innerHTML = '<div class="empty">Erreur</div>';
    }
  }

  function fermerAlerte() {
    document.getElementById('alertes-list').style.display = 'flex';
    document.getElementById('alerte-detail').classList.remove('visible');
  }

  function renderArticles(articles) {
    const container = document.getElementById('feed-container');
    if (!articles.length) {
      container.innerHTML = '<div class="empty">Aucun article pour l\'instant</div>';
      return;
    }
    const slice = articles.slice(0, displayedCount + PAGE_SIZE);
    displayedCount = slice.length;
    const hasMore = articles.length > displayedCount;

    let html = '';
    if (currentView === 'grid') {
      html = `<div class="grid-view">${slice.map(a => renderGridCard(a)).join('')}</div>`;
    } else {
      html = `<div class="single-view">${renderSingleList(slice)}</div>`;
    }

    if (hasMore) {
      html += `<button class="load-more-btn" onclick="loadMore()">Charger plus (${articles.length - displayedCount} restants)</button>`;
    }

    container.innerHTML = html;
  }

  function loadMore() {
    renderArticles(allArticles);
  }

  function renderGridCard(a) {
    const img = a.photo_url
      ? `<img src="${a.photo_url}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-img>👕</div>'">`
      : `<div class="no-img">👕</div>`;
    return `
      <div class="grid-card" onclick="ouvrirArticle('${a.vinted_id}')">
        ${img}
        <div class="grid-card-overlay">
          <div class="grid-card-alerte">${a.nom_alerte || ''}</div>
          <div class="grid-card-titre">${a.titre || ''}</div>
          <div class="grid-card-prix">${a.prix || '?'}€</div>
        </div>
        <button class="grid-card-buy" onclick="acheter(event,'${a.vinted_id}',this)" title="Acheter">🛒</button>
      </div>`;
  }

  function renderSingleList(articles) {
    if (!articles.length) return '<div class="empty">Aucun article</div>';
    return articles.map(a => {
      const img = a.photo_url
        ? `<img class="single-card-img" src="${a.photo_url}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="single-card-img no-img">👕</div>`;
      const date = a.trouve_le ? new Date(a.trouve_le).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      return `
        <div class="single-card">
          ${img}
          <div class="single-card-body">
            <div>
              <div class="single-card-alerte">${a.nom_alerte || ''}</div>
              <div class="single-card-titre">${a.titre || ''}</div>
            </div>
            <div class="single-card-footer">
              <div>
                <div class="single-card-prix">${a.prix || '?'}€</div>
                <div class="single-card-date">${date}</div>
              </div>
              <button class="single-card-buy" onclick="acheter(event,'${a.vinted_id}',this)">🛒 Acheter</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function ouvrirArticle(id) {
    window.open(`https://www.vinted.fr/items/${id}`, '_blank');
  }

  async function acheter(e, itemId, btn) {
    e.stopPropagation();
    btn.classList.add('loading');
    btn.disabled = true;
    showToast('⏳ Achat en cours...');
    try {
      const res = await fetch(`/api/acheter/${itemId}`, {method: 'POST'});
      const data = await res.json();
      btn.classList.remove('loading');
      if (data.succes) {
        btn.classList.add('success');
        showToast('✅ ' + data.message, 'success');
      } else {
        btn.classList.add('error');
        showToast('❌ ' + data.message, 'error');
        setTimeout(() => { btn.classList.remove('error'); btn.disabled = false; }, 3000);
      }
    } catch(e) {
      btn.classList.remove('loading');
      btn.classList.add('error');
      showToast('❌ Erreur réseau', 'error');
      setTimeout(() => { btn.classList.remove('error'); btn.disabled = false; }, 3000);
    }
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }

  chargerFeed();
  setInterval(chargerFeed, 15000);
</script>
</body>
</html>
