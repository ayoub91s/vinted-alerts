<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vinted Alerts">
<title>Vinted Alerts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111210;
    --surface: #1a1c19;
    --surface2: #222420;
    --border: #2a2d28;
    --orange: #e8631a;
    --orange-dim: #c4521200;
    --green: #4caf74;
    --green-dim: #4caf7420;
    --text: #e8e6e0;
    --text-dim: #7a7d76;
    --text-muted: #3d403a;
    --radius: 14px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(17,18,16,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--orange), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .view-toggle {
    display: flex;
    gap: 6px;
    background: var(--surface2);
    padding: 4px;
    border-radius: 10px;
  }

  .view-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 7px;
    font-size: 14px;
    transition: all 0.2s;
  }

  .view-btn.active {
    background: var(--surface);
    color: var(--orange);
  }

  /* MAIN */
  .main {
    padding-top: 70px;
    padding-bottom: calc(80px + var(--safe-bottom));
    min-height: 100vh;
  }

  /* FEED PAGE */
  #page-feed { display: block; }
  #page-alertes { display: none; }

  /* GRID VIEW */
  .grid-view {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    padding: 2px;
  }

  .grid-card {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    background: var(--surface);
    cursor: pointer;
  }

  .grid-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }

  .grid-card:active img { transform: scale(1.03); }

  .grid-card-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 30px 10px 10px;
  }

  .grid-card-alerte {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--orange);
    font-weight: 500;
    margin-bottom: 2px;
  }

  .grid-card-titre {
    font-size: 11px;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .grid-card-prix {
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
  }

  .grid-card-buy {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, background 0.2s;
    z-index: 2;
  }

  .grid-card-buy:active { transform: scale(0.9); }
  .grid-card-buy.loading { background: var(--text-dim); }
  .grid-card-buy.success { background: var(--green); }
  .grid-card-buy.error { background: #e84040; }

  /* SINGLE VIEW */
  .single-view {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 2px;
  }

  .single-card {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    margin: 4px 12px;
    border: 1px solid var(--border);
  }

  .single-card-img {
    width: 110px;
    min-height: 140px;
    flex-shrink: 0;
    object-fit: cover;
  }

  .single-card-body {
    flex: 1;
    padding: 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .single-card-alerte {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--orange);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .single-card-titre {
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
    margin-bottom: 8px;
  }

  .single-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .single-card-prix {
    font-size: 16px;
    font-weight: 500;
    color: var(--green);
  }

  .single-card-date {
    font-size: 9px;
    color: var(--text-muted);
  }

  .single-card-buy {
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .single-card-buy:active { transform: scale(0.95); }
  .single-card-buy.loading { background: var(--text-dim); }
  .single-card-buy.success { background: var(--green); }
  .single-card-buy.error { background: #e84040; }

  /* ALERTES PAGE */
  .alertes-list {
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .alerte-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .alerte-card:active { border-color: var(--orange); }
  .alerte-card.active { border-color: var(--orange); }

  .alerte-card-left { display: flex; flex-direction: column; gap: 4px; }

  .alerte-card-nom {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .alerte-card-count {
    font-size: 11px;
    color: var(--text-dim);
  }

  .alerte-card-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
  }

  /* ALERTE DETAIL */
  .alerte-detail {
    display: none;
    padding: 0 12px 16px;
  }

  .alerte-detail.visible { display: block; }

  .alerte-detail-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .back-btn {
    background: var(--surface2);
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  .alerte-detail-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--orange);
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(17,18,16,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 10px 0 calc(10px + var(--safe-bottom));
    display: flex;
    justify-content: center;
    gap: 60px;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 16px;
    border-radius: 10px;
    transition: color 0.2s;
  }

  .nav-btn .icon { font-size: 20px; }
  .nav-btn.active { color: var(--orange); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* LOADING */
  .loading-spinner {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 200;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: #e84040; color: #e84040; }

  /* NO IMAGE */
  .no-img {
    width: 100%;
    height: 100%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">VINTED ALERTS</div>
  <div class="view-toggle" id="viewToggle">
    <button class="view-btn active" onclick="setView('grid')" id="btnGrid">⊞</button>
    <button class="view-btn" onclick="setView('single')" id="btnSingle">☰</button>
  </div>
</div>

<div class="main">

  <!-- PAGE FEED -->
  <div id="page-feed">
    <div id="feed-container" class="loading-spinner">Chargement...</div>
  </div>

  <!-- PAGE ALERTES -->
  <div id="page-alertes">
    <div class="alertes-list" id="alertes-list">
      {% for alerte in alertes %}
      <div class="alerte-card" onclick="ouvrirAlerte('{{ alerte.nom }}')" id="alerte-{{ loop.index }}">
        <div class="alerte-card-left">
          <div class="alerte-card-nom">{{ alerte.nom }}</div>
          <div class="alerte-card-count" id="count-{{ alerte.nom }}">Chargement...</div>
        </div>
        <div class="alerte-card-dot"></div>
      </div>
      {% endfor %}
    </div>
    <div class="alerte-detail" id="alerte-detail">
      <div class="alerte-detail-header">
        <button class="back-btn" onclick="fermerAlerte()">← Retour</button>
        <div class="alerte-detail-title" id="alerte-detail-title"></div>
      </div>
      <div id="alerte-detail-content"></div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('feed')" id="nav-feed">
    <span class="icon">⚡</span>
    Feed
  </button>
  <button class="nav-btn" onclick="showPage('alertes')" id="nav-alertes">
    <span class="icon">🔔</span>
    Alertes
  </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let currentView = 'grid';
  let currentPage = 'feed';
  let allArticles = [];

  // ============ NAVIGATION ============

  function showPage(page) {
    currentPage = page;
    document.getElementById('page-feed').style.display = page === 'feed' ? 'block' : 'none';
    document.getElementById('page-alertes').style.display = page === 'alertes' ? 'block' : 'none';
    document.getElementById('nav-feed').classList.toggle('active', page === 'feed');
    document.getElementById('nav-alertes').classList.toggle('active', page === 'alertes');
    document.getElementById('viewToggle').style.display = page === 'feed' ? 'flex' : 'none';
    if (page === 'alertes') chargerCompteurs();
  }

  function setView(view) {
    currentView = view;
    document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
    document.getElementById('btnSingle').classList.toggle('active', view === 'single');
    renderArticles(allArticles);
  }

  // ============ CHARGEMENT ============

  async function chargerFeed() {
    try {
      const res = await fetch('/api/articles');
      allArticles = await res.json();
      renderArticles(allArticles);
    } catch(e) {
      document.getElementById('feed-container').innerHTML = '<div class="empty">Erreur de chargement</div>';
    }
  }

  async function chargerCompteurs() {
    const alertes = {{ alertes | tojson }};
    for (const alerte of alertes) {
      try {
        const res = await fetch(`/api/articles?alerte=${encodeURIComponent(alerte.nom)}`);
        const data = await res.json();
        const el = document.getElementById(`count-${alerte.nom}`);
        if (el) el.textContent = `${data.length} article${data.length > 1 ? 's' : ''} trouvé${data.length > 1 ? 's' : ''}`;
      } catch(e) {}
    }
  }

  async function ouvrirAlerte(nom) {
    document.getElementById('alertes-list').style.display = 'none';
    const detail = document.getElementById('alerte-detail');
    detail.classList.add('visible');
    document.getElementById('alerte-detail-title').textContent = nom;
    document.getElementById('alerte-detail-content').innerHTML = '<div class="loading-spinner">Chargement...</div>';
    try {
      const res = await fetch(`/api/articles?alerte=${encodeURIComponent(nom)}`);
      const articles = await res.json();
      document.getElementById('alerte-detail-content').innerHTML = renderSingleList(articles);
    } catch(e) {
      document.getElementById('alerte-detail-content').innerHTML = '<div class="empty">Erreur</div>';
    }
  }

  function fermerAlerte() {
    document.getElementById('alertes-list').style.display = 'flex';
    document.getElementById('alerte-detail').classList.remove('visible');
  }

  // ============ RENDU ============

  function renderArticles(articles) {
    const container = document.getElementById('feed-container');
    if (!articles.length) {
      container.innerHTML = '<div class="empty">Aucun article pour l\'instant</div>';
      return;
    }
    if (currentView === 'grid') {
      container.innerHTML = `<div class="grid-view">${articles.map(a => renderGridCard(a)).join('')}</div>`;
    } else {
      container.innerHTML = `<div class="single-view">${renderSingleList(articles)}</div>`;
    }
  }

  function renderGridCard(a) {
    const img = a.photo_url
      ? `<img src="${a.photo_url}" alt="${a.titre}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-img>👕</div>'">`
      : `<div class="no-img">👕</div>`;
    return `
      <div class="grid-card" onclick="ouvrirArticle('${a.vinted_id}')">
        ${img}
        <div class="grid-card-overlay">
          <div class="grid-card-alerte">${a.nom_alerte}</div>
          <div class="grid-card-titre">${a.titre}</div>
          <div class="grid-card-prix">${a.prix || '?'}€</div>
        </div>
        <button class="grid-card-buy" onclick="acheter(event, '${a.vinted_id}', this)">🛒</button>
      </div>`;
  }

  function renderSingleList(articles) {
    if (!articles.length) return '<div class="empty">Aucun article</div>';
    return articles.map(a => {
      const img = a.photo_url
        ? `<img class="single-card-img" src="${a.photo_url}" alt="${a.titre}" loading="lazy" onerror="this.src=''">`
        : `<div class="single-card-img no-img">👕</div>`;
      const date = a.trouve_le ? new Date(a.trouve_le).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : '';
      return `
        <div class="single-card">
          ${img}
          <div class="single-card-body">
            <div>
              <div class="single-card-alerte">${a.nom_alerte}</div>
              <div class="single-card-titre">${a.titre}</div>
            </div>
            <div class="single-card-footer">
              <div>
                <div class="single-card-prix">${a.prix || '?'}€</div>
                <div class="single-card-date">${date}</div>
              </div>
              <button class="single-card-buy" onclick="acheter(event, '${a.vinted_id}', this)">🛒 Acheter</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function ouvrirArticle(id) {
    window.open(`https://www.vinted.fr/items/${id}`, '_blank');
  }

  // ============ ACHAT ============

  async function acheter(e, itemId, btn) {
    e.stopPropagation();
    btn.classList.add('loading');
    btn.disabled = true;
    showToast('⏳ Achat en cours...');
    try {
      const res = await fetch(`/api/acheter/${itemId}`, {method: 'POST'});
      const data = await res.json();
      if (data.succes) {
        btn.classList.remove('loading');
        btn.classList.add('success');
        showToast('✅ ' + data.message, 'success');
      } else {
        btn.classList.remove('loading');
        btn.classList.add('error');
        showToast('❌ ' + data.message, 'error');
        setTimeout(() => { btn.classList.remove('error'); btn.disabled = false; }, 3000);
      }
    } catch(e) {
      btn.classList.remove('loading');
      btn.classList.add('error');
      showToast('❌ Erreur réseau', 'error');
      setTimeout(() => { btn.classList.remove('error'); btn.disabled = false; }, 3000);
    }
  }

  // ============ TOAST ============

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }

  // ============ AUTO-REFRESH ============

  chargerFeed();
  setInterval(chargerFeed, 15000); // Refresh toutes les 15 secondes
</script>
</body>
</html>
