<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vinted Alerts">
<title>Vinted Alerts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111210;
    --surface: #1a1c19;
    --surface2: #222420;
    --border: #2a2d28;
    --orange: #e8631a;
    --green: #4caf74;
    --text: #e8e6e0;
    --text-dim: #7a7d76;
    --text-muted: #3d403a;
    --radius: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }

  /* HEADER */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(17,18,16,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .header-title {
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
    background: linear-gradient(135deg, var(--orange), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .header-search {
    flex: 1; max-width: 300px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px;
    outline: none;
  }
  .header-search:focus { border-color: var(--orange); }
  .header-search::placeholder { color: var(--text-muted); }
  .view-toggle {
    display: flex; gap: 3px; background: var(--surface2); padding: 3px; border-radius: 8px; flex-shrink: 0;
  }
  .view-btn {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    padding: 4px 8px; border-radius: 5px; font-size: 13px; transition: all 0.2s;
  }
  .view-btn.active { background: var(--surface); color: var(--orange); }

  /* MAIN */
  .main { padding-top: 58px; padding-bottom: calc(68px + var(--safe-bottom)); }
  #page-feed { display: block; }
  #page-alertes { display: none; }

  /* GRID */
  .grid-view { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; padding: 2px; }
  @media (min-width: 768px) { .grid-view { grid-template-columns: repeat(4, 1fr); } }

  .grid-card { position: relative; aspect-ratio: 3/4; overflow: hidden; background: var(--surface); cursor: pointer; }
  .grid-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; display: block; }
  .grid-card:hover img { transform: scale(1.03); }

  .grid-card-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.88));
    padding: 32px 8px 40px;
  }
  .grid-card-alerte { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: var(--orange); font-weight: 500; margin-bottom: 2px; }
  .grid-card-titre { font-size: 10px; color: var(--text); line-height: 1.3; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .grid-card-prix { font-size: 12px; font-weight: 500; color: var(--green); }

  /* BOUTON ACHETER — fond noir, éclair orange, bas droite */
  .grid-card-buy {
    position: absolute; bottom: 8px; right: 8px;
    width: 36px; height: 36px;
    background: #000; border: 1.5px solid var(--orange);
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, background 0.2s;
    z-index: 2;
  }
  .grid-card-buy svg { width: 16px; height: 16px; }
  .grid-card-buy:hover { transform: scale(1.1); background: #111; }
  .grid-card-buy:active { transform: scale(0.9); }
  .grid-card-buy.loading { background: #222; border-color: var(--text-dim); }
  .grid-card-buy.success { background: #000; border-color: var(--green); }
  .grid-card-buy.success svg path { fill: var(--green); }
  .grid-card-buy.error { background: #000; border-color: #e84040; }
  .grid-card-buy.error svg path { fill: #e84040; }

  /* SINGLE VIEW */
  .single-view { display: flex; flex-direction: column; gap: 2px; padding: 8px; }
  @media (min-width: 768px) { .single-view { max-width: 800px; margin: 0 auto; padding: 16px; gap: 8px; } }

  .single-card { display: flex; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .single-card-img { width: 100px; min-height: 130px; flex-shrink: 0; object-fit: cover; display: block; cursor: pointer; }
  @media (min-width: 768px) { .single-card-img { width: 140px; min-height: 170px; } }
  .single-card-body { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; }
  .single-card-alerte { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--orange); font-weight: 500; margin-bottom: 4px; }
  .single-card-titre { font-size: 11px; color: var(--text); line-height: 1.4; flex: 1; margin-bottom: 8px; }
  .single-card-footer { display: flex; align-items: center; justify-content: space-between; }
  .single-card-prix { font-size: 15px; font-weight: 500; color: var(--green); }
  .single-card-date { font-size: 9px; color: var(--text-muted); margin-top: 2px; }
  .single-card-buy {
    background: var(--orange); color: white; border: none; border-radius: 8px;
    padding: 6px 12px; font-size: 10px; font-family: 'DM Mono', monospace;
    cursor: pointer; transition: all 0.2s; font-weight: 500;
  }
  .single-card-buy:active { transform: scale(0.95); }
  .single-card-buy.loading { background: var(--text-dim); }
  .single-card-buy.success { background: var(--green); }
  .single-card-buy.error { background: #e84040; }

  /* ALERTES PAGE */
  .alertes-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  @media (min-width: 768px) { .alertes-list { max-width: 600px; margin: 0 auto; padding: 20px; } }
  .alerte-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: border-color 0.2s; display: flex; align-items: center; justify-content: space-between; }
  .alerte-card:hover { border-color: var(--orange); }
  .alerte-card-nom { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
  .alerte-card-count { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
  .alerte-card-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .alerte-detail { display: none; padding: 0 12px 16px; }
  .alerte-detail.visible { display: block; }
  .alerte-detail-header { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
  .back-btn { background: var(--surface2); border: none; color: var(--text-dim); cursor: pointer; padding: 5px 10px; border-radius: 7px; font-size: 12px; font-family: 'DM Mono', monospace; }
  .alerte-detail-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--orange); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(17,18,16,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 8px 0 calc(8px + var(--safe-bottom));
    display: flex; justify-content: center; gap: 60px;
  }
  .nav-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 8px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1px; padding: 4px 16px; border-radius: 8px; transition: color 0.2s; }
  .nav-btn .icon { font-size: 18px; }
  .nav-btn.active { color: var(--orange); }

  /* DETAIL MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
    flex-direction: column; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }

  .modal-close {
    position: fixed; top: 16px; right: 16px; z-index: 310;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); width: 36px; height: 36px; border-radius: 50%;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .modal-content { width: 100%; max-width: 500px; margin: 0 auto; padding: 60px 0 40px; }

  /* CAROUSEL */
  .carousel { position: relative; width: 100%; aspect-ratio: 1; overflow: hidden; background: var(--surface); cursor: pointer; }
  .carousel img { width: 100%; height: 100%; object-fit: cover; display: block; user-select: none; }
  .carousel-dots { display: flex; justify-content: center; gap: 5px; padding: 10px; }
  .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: background 0.2s; flex-shrink: 0; }
  .carousel-dot.active { background: var(--orange); width: 18px; border-radius: 3px; }

  /* DETAIL INFO */
  .detail-info { padding: 16px; }
  .detail-titre { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .detail-prix { font-size: 22px; font-weight: 500; color: var(--green); margin-bottom: 12px; }
  .detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .detail-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 10px; color: var(--text-dim); }
  .detail-tag span { color: var(--text); }
  .detail-desc { font-size: 11px; color: var(--text-dim); line-height: 1.6; margin-bottom: 20px; white-space: pre-wrap; }
  .detail-actions { display: flex; gap: 10px; }
  .detail-buy-btn {
    flex: 1; background: var(--orange); color: white; border: none;
    border-radius: var(--radius); padding: 14px; font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
  }
  .detail-buy-btn:active { opacity: 0.8; }
  .detail-buy-btn.loading { background: var(--text-dim); }
  .detail-buy-btn.success { background: var(--green); }
  .detail-buy-btn.error { background: #e84040; }
  .detail-vinted-btn {
    background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px; font-family: 'DM Mono', monospace;
    font-size: 11px; cursor: pointer; text-decoration: none; display: flex; align-items: center;
  }

  /* MISC */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 12px; }
  .loading-spinner { text-align: center; padding: 40px; color: var(--text-dim); font-size: 11px; }
  .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 18px; border-radius: 20px; font-size: 11px; z-index: 400; opacity: 0; transition: all 0.3s; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: #e84040; color: #e84040; }
  .no-img { width: 100%; height: 100%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--text-muted); }
  .load-more-btn { display: block; width: calc(100% - 16px); margin: 12px 8px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; text-align: center; transition: border-color 0.2s; }
  .load-more-btn:hover { border-color: var(--orange); color: var(--orange); }
  .detail-loading { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">VINTED ALERTS</div>
  <input type="text" class="header-search" id="searchInput" placeholder="🔍 Rechercher..." oninput="rechercherArticles(this.value)">
  <div class="view-toggle" id="viewToggle">
    <button class="view-btn active" onclick="setView('grid')" id="btnGrid">⊞</button>
    <button class="view-btn" onclick="setView('single')" id="btnSingle">☰</button>
  </div>
</div>

<div class="main">
  <div id="page-feed">
    <div id="feed-container" class="loading-spinner">Chargement...</div>
  </div>
  <div id="page-alertes">
    <div class="alertes-list" id="alertes-list">
      {% for alerte in alertes %}
      <div class="alerte-card" onclick="ouvrirAlerte('{{ alerte.nom }}')">
        <div>
          <div class="alerte-card-nom">{{ alerte.nom }}</div>
          <div class="alerte-card-count" id="count-{{ alerte.nom }}">Chargement...</div>
        </div>
        <div class="alerte-card-dot"></div>
      </div>
      {% endfor %}
    </div>
    <div class="alerte-detail" id="alerte-detail">
      <div class="alerte-detail-header">
        <button class="back-btn" onclick="fermerAlerte()">← Retour</button>
        <div class="alerte-detail-title" id="alerte-detail-title"></div>
      </div>
      <div id="alerte-detail-content"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('feed')" id="nav-feed"><span class="icon">⚡</span>Feed</button>
  <button class="nav-btn" onclick="showPage('alertes')" id="nav-alertes"><span class="icon">🔔</span>Alertes</button>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <button class="modal-close" onclick="fermerDetail()">✕</button>
  <div class="modal-content" id="detailContent">
    <div class="detail-loading">Chargement...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // SVG éclair orange
  const ECLAIR_SVG = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L4.09 12.96H11L10 22L20 10.5H13.5L13 2Z" fill="#e8631a"/></svg>`;
  const ECLAIR_SVG_GREEN = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L4.09 12.96H11L10 22L20 10.5H13.5L13 2Z" fill="#4caf74"/></svg>`;

  let currentView = 'grid';
  let currentPage = 'feed';
  let allArticles = [];
  let displayedCount = 0;
  const PAGE_SIZE = 40;
  let searchTimeout = null;
  let currentCarouselPhotos = [];
  let currentCarouselIndex = 0;
  let currentDetailId = null;

  // ============ NAVIGATION ============
  function showPage(page) {
    currentPage = page;
    document.getElementById('page-feed').style.display = page === 'feed' ? 'block' : 'none';
    document.getElementById('page-alertes').style.display = page === 'alertes' ? 'block' : 'none';
    document.getElementById('nav-feed').classList.toggle('active', page === 'feed');
    document.getElementById('nav-alertes').classList.toggle('active', page === 'alertes');
    document.getElementById('viewToggle').style.display = page === 'feed' ? 'flex' : 'none';
    document.getElementById('searchInput').style.display = page === 'feed' ? 'block' : 'none';
    if (page === 'alertes') chargerCompteurs();
  }

  function setView(view) {
    currentView = view;
    document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
    document.getElementById('btnSingle').classList.toggle('active', view === 'single');
    displayedCount = 0;
    renderArticles(allArticles);
  }

  // ============ RECHERCHE ============
  function rechercherArticles(query) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
      const url = query.trim() ? `/api/articles?search=${encodeURIComponent(query.trim())}` : '/api/articles';
      try {
        const res = await fetch(url);
        allArticles = await res.json();
        displayedCount = 0;
        renderArticles(allArticles);
      } catch(e) {}
    }, 300);
  }

  // ============ CHARGEMENT ============
  async function chargerFeed() {
    const search = document.getElementById('searchInput').value.trim();
    const url = search ? `/api/articles?search=${encodeURIComponent(search)}` : '/api/articles';
    try {
      const res = await fetch(url);
      const newArticles = await res.json();
      if (JSON.stringify(newArticles.map(a=>a.vinted_id)) !== JSON.stringify(allArticles.map(a=>a.vinted_id))) {
        allArticles = newArticles;
        displayedCount = 0;
        renderArticles(allArticles);
      }
    } catch(e) {}
  }

  async function chargerFeedInitial() {
    try {
      const res = await fetch('/api/articles');
      allArticles = await res.json();
      displayedCount = 0;
      renderArticles(allArticles);
    } catch(e) {
      document.getElementById('feed-container').innerHTML = '<div class="empty">Erreur de chargement</div>';
    }
  }

  async function chargerCompteurs() {
    const alertes = {{ alertes | tojson }};
    for (const alerte of alertes) {
      try {
        const res = await fetch(`/api/articles?alerte=${encodeURIComponent(alerte.nom)}`);
        const data = await res.json();
        const el = document.getElementById(`count-${alerte.nom}`);
        if (el) el.textContent = `${data.length} article${data.length !== 1 ? 's' : ''}`;
      } catch(e) {}
    }
  }

  async function ouvrirAlerte(nom) {
    document.getElementById('alertes-list').style.display = 'none';
    const detail = document.getElementById('alerte-detail');
    detail.classList.add('visible');
    document.getElementById('alerte-detail-title').textContent = nom;
    document.getElementById('alerte-detail-content').innerHTML = '<div class="loading-spinner">Chargement...</div>';
    try {
      const res = await fetch(`/api/articles?alerte=${encodeURIComponent(nom)}`);
      const articles = await res.json();
      document.getElementById('alerte-detail-content').innerHTML = `<div class="single-view">${renderSingleList(articles)}</div>`;
    } catch(e) {
      document.getElementById('alerte-detail-content').innerHTML = '<div class="empty">Erreur</div>';
    }
  }

  function fermerAlerte() {
    document.getElementById('alertes-list').style.display = 'flex';
    document.getElementById('alerte-detail').classList.remove('visible');
  }

  // ============ RENDU ============
  function renderArticles(articles) {
    const container = document.getElementById('feed-container');
    if (!articles.length) {
      container.innerHTML = '<div class="empty">Aucun article trouvé</div>';
      return;
    }
    const slice = articles.slice(0, displayedCount + PAGE_SIZE);
    displayedCount = slice.length;
    const hasMore = articles.length > displayedCount;
    let html = currentView === 'grid'
      ? `<div class="grid-view">${slice.map(a => renderGridCard(a)).join('')}</div>`
      : `<div class="single-view">${renderSingleList(slice)}</div>`;
    if (hasMore) html += `<button class="load-more-btn" onclick="loadMore()">Charger plus (${articles.length - displayedCount} restants)</button>`;
    container.innerHTML = html;
  }

  function loadMore() { renderArticles(allArticles); }

  function renderGridCard(a) {
    const img = a.photo_url
      ? `<img src="${a.photo_url}" alt="" loading="lazy" onerror="this.parentElement.querySelector('.no-img-fb') && (this.style.display='none')">`
      : `<div class="no-img">👕</div>`;
    return `
      <div class="grid-card"
        onclick="ouvrirArticle('${a.vinted_id}')"
        oncontextmenu="ouvrirDetail(event,'${a.vinted_id}'); return false;"
        data-longpress="${a.vinted_id}">
        ${img}
        <div class="grid-card-overlay">
          <div class="grid-card-alerte">${a.nom_alerte || ''}</div>
          <div class="grid-card-titre">${a.titre || ''}</div>
          <div class="grid-card-prix">${a.prix || '?'}€</div>
        </div>
        <button class="grid-card-buy" onclick="acheter(event,'${a.vinted_id}',this)" title="Acheter">${ECLAIR_SVG}</button>
      </div>`;
  }

  function renderSingleList(articles) {
    if (!articles.length) return '<div class="empty">Aucun article</div>';
    return articles.map(a => {
      const img = a.photo_url
        ? `<img class="single-card-img" src="${a.photo_url}" alt="" loading="lazy" onclick="ouvrirDetail(event,'${a.vinted_id}')">`
        : `<div class="single-card-img no-img" onclick="ouvrirDetail(event,'${a.vinted_id}')">👕</div>`;
      const date = a.trouve_le ? new Date(a.trouve_le).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      return `
        <div class="single-card">
          ${img}
          <div class="single-card-body">
            <div>
              <div class="single-card-alerte">${a.nom_alerte || ''}</div>
              <div class="single-card-titre">${a.titre || ''}</div>
            </div>
            <div class="single-card-footer">
              <div>
                <div class="single-card-prix">${a.prix || '?'}€</div>
                <div class="single-card-date">${date}</div>
              </div>
              <button class="single-card-buy" onclick="acheter(event,'${a.vinted_id}',this)">🛒 Acheter</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ============ LONG PRESS ============
  let longPressTimer = null;

  document.addEventListener('touchstart', (e) => {
    const card = e.target.closest('[data-longpress]');
    if (!card) return;
    longPressTimer = setTimeout(() => {
      ouvrirDetail(e, card.dataset.longpress);
    }, 500);
  }, {passive: true});

  document.addEventListener('touchend', () => {
    clearTimeout(longPressTimer);
  });

  document.addEventListener('touchmove', () => {
    clearTimeout(longPressTimer);
  }, {passive: true});

  // ============ DETAIL MODAL ============
  async function ouvrirDetail(e, itemId) {
    e.stopPropagation();
    currentDetailId = itemId;
    const modal = document.getElementById('detailModal');
    const content = document.getElementById('detailContent');
    modal.classList.add('open');
    content.innerHTML = '<div class="detail-loading">Chargement...</div>';

    try {
      const res = await fetch(`/api/item/${itemId}`);
      const data = await res.json();
      if (!data.succes) {
        content.innerHTML = `<div class="detail-loading">Erreur : ${data.message}</div>`;
        return;
      }
      currentCarouselPhotos = data.photos;
      currentCarouselIndex = 0;
      renderDetail(data);
    } catch(e) {
      content.innerHTML = '<div class="detail-loading">Erreur de chargement</div>';
    }
  }

  function renderDetail(data) {
    const content = document.getElementById('detailContent');
    const photos = data.photos;
    const dotsHtml = photos.map((_, i) =>
      `<div class="carousel-dot ${i === 0 ? 'active' : ''}" id="dot-${i}"></div>`
    ).join('');

    content.innerHTML = `
      <div class="carousel" onclick="photoSuivante()">
        <img id="carouselImg" src="${photos[0] || ''}" alt="">
      </div>
      <div class="carousel-dots">${dotsHtml}</div>
      <div class="detail-info">
        <div class="detail-titre">${data.titre}</div>
        <div class="detail-prix">${data.prix}€</div>
        <div class="detail-meta">
          ${data.marque ? `<div class="detail-tag">Marque <span>${data.marque}</span></div>` : ''}
          ${data.taille ? `<div class="detail-tag">Taille <span>${data.taille}</span></div>` : ''}
          ${data.etat ? `<div class="detail-tag">État <span>${data.etat}</span></div>` : ''}
          ${data.temps ? `<div class="detail-tag">Publié <span>${data.temps}</span></div>` : ''}
        </div>
        ${data.description ? `<div class="detail-desc">${data.description}</div>` : ''}
        <div class="detail-actions">
          <button class="detail-buy-btn" id="detailBuyBtn" onclick="acheterDetail('${data.id}')">⚡ Acheter maintenant</button>
          <a class="detail-vinted-btn" href="${data.lien}" target="_blank">Voir sur Vinted →</a>
        </div>
      </div>`;
  }

  function photoSuivante() {
    if (!currentCarouselPhotos.length) return;
    currentCarouselIndex = (currentCarouselIndex + 1) % currentCarouselPhotos.length;
    document.getElementById('carouselImg').src = currentCarouselPhotos[currentCarouselIndex];
    document.querySelectorAll('.carousel-dot').forEach((d, i) => {
      d.classList.toggle('active', i === currentCarouselIndex);
    });
  }

  function fermerDetail() {
    document.getElementById('detailModal').classList.remove('open');
    currentDetailId = null;
  }

  async function acheterDetail(itemId) {
    const btn = document.getElementById('detailBuyBtn');
    btn.classList.add('loading');
    btn.disabled = true;
    btn.textContent = '⏳ Achat en cours...';
    try {
      const res = await fetch(`/api/acheter/${itemId}`, {method: 'POST'});
      const data = await res.json();
      btn.classList.remove('loading');
      if (data.succes) {
        btn.classList.add('success');
        btn.textContent = '✅ Acheté !';
        showToast('✅ ' + data.message, 'success');
      } else {
        btn.classList.add('error');
        btn.textContent = '❌ Échec';
        showToast('❌ ' + data.message, 'error');
        setTimeout(() => { btn.classList.remove('error'); btn.disabled = false; btn.textContent = '⚡ Acheter maintenant'; }, 3000);
      }
    } catch(e) {
      btn.classList.remove('loading');
      btn.classList.add('error');
      btn.textContent = '❌ Erreur';
      setTimeout(() => { btn.classList.remove('error'); btn.disabled = false; btn.textContent = '⚡ Acheter maintenant'; }, 3000);
    }
  }

  // ============ ACHAT GRID/SINGLE ============
  async function acheter(e, itemId, btn) {
    e.stopPropagation();
    btn.classList.add('loading');
    btn.disabled = true;
    btn.innerHTML = '⏳';
    showToast('⏳ Achat en cours...');
    try {
      const res = await fetch(`/api/acheter/${itemId}`, {method: 'POST'});
      const data = await res.json();
      btn.classList.remove('loading');
      if (data.succes) {
        btn.classList.add('success');
        btn.innerHTML = ECLAIR_SVG_GREEN;
        showToast('✅ ' + data.message, 'success');
      } else {
        btn.classList.add('error');
        btn.innerHTML = '✕';
        showToast('❌ ' + data.message, 'error');
        setTimeout(() => { btn.classList.remove('error'); btn.disabled = false; btn.innerHTML = ECLAIR_SVG; }, 3000);
      }
    } catch(e) {
      btn.classList.remove('loading');
      btn.classList.add('error');
      btn.innerHTML = '✕';
      showToast('❌ Erreur réseau', 'error');
      setTimeout(() => { btn.classList.remove('error'); btn.disabled = false; btn.innerHTML = ECLAIR_SVG; }, 3000);
    }
  }

  function ouvrirArticle(id) {
    window.open(`https://www.vinted.fr/items/${id}`, '_blank');
  }

  // ============ TOAST ============
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }

  // Fermer modal avec Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') fermerDetail();
  });

  chargerFeedInitial();
  setInterval(chargerFeed, 15000);
</script>
</body>
</html>
